---
- name: Restart hermes gateway # noqa: no-changed-when
  ansible.builtin.shell:
    cmd: /home/{{ hermes_user }}/.local/bin/hermes gateway stop && /home/{{ hermes_user }}/.local/bin/hermes gateway start
  become: true
  become_user: "{{ hermes_user }}"
  environment:
    HOME: /home/{{ hermes_user }}
    XDG_RUNTIME_DIR: "/run/user/{{ hermes_user_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ hermes_user_uid.stdout }}/bus"
  failed_when: false
