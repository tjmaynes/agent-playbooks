---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Rate-limit SSH through UFW
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Harden sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
  notify: Restart sshd

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Configure fail2ban SSH jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 86400
      bantime.increment = true
      findtime = 3600
      maxretry = 5
      backend = systemd

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Install custom CA certificate
  ansible.builtin.copy:
    src: "{{ custom_ca_certificate_path }}"
    dest: /usr/local/share/ca-certificates/custom-ca.crt
    mode: "0644"
    validate: openssl x509 -noout -in %s
  when: custom_ca_certificate_path is defined
  notify:
    - Update CA certificates

- name: Install libnss3-tools for certutil
  ansible.builtin.apt:
    name: libnss3-tools
    state: present
  when: custom_ca_certificate_path is defined

- name: Create NSS database for Chromium
  ansible.builtin.file:
    path: /home/{{ security_user }}/.pki/nssdb
    state: directory
    owner: "{{ security_user }}"
    group: "{{ security_user }}"
    mode: "0700"
  become: true
  become_user: "{{ security_user }}"
  when: custom_ca_certificate_path is defined

- name: Import custom CA into Chromium trust store # noqa: no-changed-when
  ansible.builtin.command:
    cmd: >-
      certutil -d sql:/home/{{ security_user }}/.pki/nssdb
      -A -t "C,," -n "custom-ca"
      -i /usr/local/share/ca-certificates/custom-ca.crt
  become: true
  become_user: "{{ security_user }}"
  when: custom_ca_certificate_path is defined
